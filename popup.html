<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>My Color Picker</title>
</head>
<body>

    <main>

        <button id="color-button">Pick a Color</button>

        <section id="result" class="d-none">
            <div id="color-box" title="Click to copy HEX"></div>
            <div class="result-color" data-target="color-hex">
                <span class="color-label">HEX</span>
                <span id="color-hex" class="color-value"></span>
            </div>
            <div class="result-color" data-target="color-rgb">
                <span class="color-label">RGB</span>
                <span id="color-rgb" class="color-value"></span>
            </div>
        </section>

        <footer class="shortcut-guide">
            Tip: Press <span id="shortcut-text"></span> to open quickly
        </footer>

    </main>

    <script src="popup.js"></script>

</body>

</html>
