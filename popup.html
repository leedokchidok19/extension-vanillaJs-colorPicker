<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>My Color Picker</title>
</head>
<body>
    <main>
        <h3 class="rainbow-text">My Color Picker</h3>
        <button id="color-button">Pick a Color</button>
        <section id="result" class="d-none">
            <div id="color-box" title="Click to copy HEX"></div>
            <div class="result-color">
                HEX: <span id="color-hex"></span>
                <button data-target="color-hex">Copy</button>
            </div>
            <div class="result-color">
                RGB: <span id="color-rgb"></span>
                <button data-target="color-rgb">Copy</button>
            </div>
        </section>
    </main>
    <script src="popup.js"></script>
</body>
</html>
